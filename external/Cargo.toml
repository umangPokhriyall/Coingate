[package]
name = "external"
version = "0.1.0"
edition = "2024"

[dependencies]
# Reuse the existing Solana stack (matches the poller) — no new chain deps.
solana-client = "2.3"
solana-sdk = "2.3"
solana-transaction-status = "2.3"
reqwest = { version = "0.12", features = ["json"] }
uuid = { version = "1", features = ["v4"] }
thiserror = "2"
serde_json = "1"

[dev-dependencies]
# Test-only async runtime for the happy-path e2e on the mocks.
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread"] }
